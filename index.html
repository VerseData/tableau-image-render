<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tableau Photo Gallery</title>

    <!-- IMPORTANT:
         Use a LOCAL copy for reliability inside Tableau.
         Put tableau.extensions.1.latest.min.js in the same folder on GitHub Pages. -->
    <script src="./tableau.extensions.1.latest.min.js"></script>

    <style>
      :root{
        --bg:#f6f7f9;
        --card:#fff;
        --border:#e7e7e7;
        --text:#222;
        --muted:#666;
        --shadow:0 1px 6px rgba(0,0,0,0.06);
        --shadowHover:0 10px 24px rgba(0,0,0,0.12);
      }

      html, body { height:100%; margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--text); }
      body { background:#fff; }

      .root{ height:100%; display:flex; flex-direction:column; }

      /* Top bar */
      .bar{
        display:flex; align-items:center; gap:10px;
        padding:10px 12px;
        border-bottom:1px solid var(--border);
        background:#fff;
      }
      .bar .group{ display:flex; align-items:center; gap:8px; }
      .bar .small{ color:var(--muted); font-size:12px; white-space:nowrap; }

      .bar button{
        padding:8px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fff;
        cursor:pointer;
      }
      .bar button.primary{
        border-color:#cfd6ff;
        background:#f3f5ff;
      }
      .bar button:disabled{
        opacity:0.55;
        cursor:not-allowed;
      }

      .bar select, .bar input[type="text"]{
        padding:8px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fff;
      }
      .bar input[type="text"]{ width:240px; }
      .bar .status{
        flex:1;
        min-width:200px;
        padding:8px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fafafa;
        color:#333;
      }

      .toggle{
        display:flex; align-items:center; gap:6px;
        padding:6px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fff;
        user-select:none;
      }
      .toggle input{ margin:0; }

      /* Main */
      .content{
        flex:1;
        min-height:0;
        display:flex;
        flex-direction:column;
        background:var(--bg);
      }

      /* Info row (counts + paging) */
      .subbar{
        display:flex; align-items:center; justify-content:space-between;
        gap:10px;
        padding:10px 12px;
        border-bottom:1px solid var(--border);
        background:#fff;
      }
      .subbar .left{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
      .pill{
        padding:6px 10px;
        border:1px solid #ddd;
        border-radius:999px;
        background:#fff;
        color:#333;
        font-size:12px;
      }
      .pager{
        display:flex; align-items:center; gap:8px;
      }
      .pager button{
        padding:6px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fff;
        cursor:pointer;
      }
      .pager button:disabled{ opacity:0.55; cursor:not-allowed; }
      .pager .pagebox{
        min-width:54px;
        text-align:center;
        padding:6px 10px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fafafa;
        font-size:12px;
      }

      /* Grid */
      .gridWrap{
        flex:1;
        min-height:0;
        overflow:auto;
        padding:12px;
      }
      #grid{
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap:12px;
        align-content:start;
      }

      .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:16px;
        overflow:hidden;
        box-shadow:var(--shadow);
        cursor:pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }
      .card:hover{
        transform: translateY(-2px);
        box-shadow: var(--shadowHover);
      }

      .thumb{
        position:relative;
        width:100%;
        aspect-ratio: 4 / 3;
        background:#e9edf2;
        overflow:hidden;
      }
      .thumb img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
      }

      .badge{
        position:absolute;
        top:10px;
        left:10px;
        padding:6px 10px;
        border-radius:999px;
        font-size:12px;
        color:#fff;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(4px);
      }

      .caption{
        position:absolute;
        left:0; right:0; bottom:0;
        padding:10px;
        font-size:12px;
        color:#fff;
        background: linear-gradient(to top, rgba(0,0,0,0.68), rgba(0,0,0,0));
        display:flex;
        justify-content:space-between;
        align-items:flex-end;
        gap:10px;
      }
      .caption .text{
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        opacity:0.95;
      }
      .iconbtn{
        width:28px; height:28px;
        border-radius:10px;
        border:1px solid rgba(255,255,255,0.35);
        background: rgba(0,0,0,0.35);
        color:#fff;
        display:grid;
        place-items:center;
        cursor:pointer;
      }
      .iconbtn:hover{ background: rgba(0,0,0,0.55); }

      /* Bottom "Load more" */
      .footer{
        padding:10px 12px;
        border-top:1px solid var(--border);
        background:#fff;
        display:flex;
        justify-content:center;
        gap:10px;
      }

      /* Empty/Error overlay */
      #empty{
        position:absolute;
        inset:0;
        display:none;
        place-items:center;
        padding:20px;
        text-align:center;
        color:#666;
        background:#fff;
        z-index:10;
      }
      .errorText{ color:#b00020; }

      /* Lightbox viewer */
      #overlay{
        position:fixed;
        inset:0;
        background: rgba(0,0,0,0.86);
        display:none;
        z-index:999999;
      }
      #overlay.open{ display:block; }

      .viewerBar{
        position:absolute;
        top:10px; left:10px; right:10px;
        display:flex; align-items:center; gap:8px;
      }
      .viewerBar button{
        padding:8px 10px;
        border:1px solid #444;
        border-radius:12px;
        background: rgba(20,20,20,0.85);
        color:#eee;
        cursor:pointer;
      }
      .viewerBar .spacer{ flex:1; }
      .viewerBar .title{
        color:#ddd;
        font-size:12px;
        max-width:40vw;
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
      }
      .viewerBar .pillDark{
        padding:6px 10px;
        border-radius:999px;
        border:1px solid #444;
        background: rgba(20,20,20,0.85);
        color:#ddd;
        font-size:12px;
      }

      .stage{
        position:absolute;
        inset:54px 10px 10px 10px;
        overflow:hidden;
        border-radius:16px;
        background:#111;
      }
      #viewport{
        position:absolute; inset:0;
        display:grid; place-items:center;
        cursor:grab; user-select:none;
      }
      #viewport.dragging{ cursor:grabbing; }
      #fullImg{
        max-width:95%;
        max-height:95%;
        transform-origin:center center;
        will-change: transform;
        pointer-events:none;
      }
    </style>
  </head>

  <body>
    <div class="root">
      <div class="bar">
        <div class="group">
          <button id="refreshBtn" class="primary" type="button">Refresh</button>
          <button id="clearBtn" type="button">Clear Cache</button>
        </div>

        <div class="group">
          <span class="small">Sheet:</span>
          <select id="sheetSelect"></select>
        </div>

        <div class="group">
          <span class="small">URL field:</span>
          <select id="fieldSelect">
            <option value="">Auto-detect</option>
          </select>
        </div>

        <div class="group">
          <span class="small">Chunk:</span>
          <select id="chunkSelect">
            <option value="1000">1,000</option>
            <option value="2500">2,500</option>
            <option value="5000" selected>5,000</option>
            <option value="10000">10,000</option>
          </select>
        </div>

        <div class="group">
          <span class="small">Page size:</span>
          <select id="pageSizeSelect">
            <option value="100">100</option>
            <option value="200" selected>200</option>
            <option value="300">300</option>
            <option value="500">500</option>
          </select>
        </div>

        <div class="group">
          <span class="small">Search:</span>
          <input id="searchInput" type="text" placeholder="Search thumbnails…" />
        </div>

        <label class="toggle" title="When enabled, scrolling loads next page automatically">
          <input id="infiniteToggle" type="checkbox" />
          <span class="small">Infinite</span>
        </label>

        <input id="status" class="status" readonly value="Initializing…" />
      </div>

      <div class="content" style="position:relative;">
        <div class="subbar">
          <div class="left">
            <span id="countPill" class="pill">0 images</span>
            <span id="filteredPill" class="pill">0 shown</span>
            <span id="chunkPill" class="pill">Loaded: 0</span>
          </div>

          <div class="pager">
            <button id="firstBtn" type="button">«</button>
            <button id="prevBtn" type="button">‹</button>
            <div id="pageBox" class="pagebox">1 / 1</div>
            <button id="nextBtn" type="button">›</button>
            <button id="lastBtn" type="button">»</button>
          </div>
        </div>

        <div id="empty"></div>

        <div id="gridWrap" class="gridWrap">
          <div id="grid"></div>
        </div>

        <div class="footer">
          <button id="loadMoreBtn" type="button">Load more</button>
        </div>
      </div>
    </div>

    <!-- Lightbox viewer -->
    <div id="overlay" aria-hidden="true">
      <div class="viewerBar">
        <button id="closeBtn" type="button">Close (Esc)</button>
        <button id="vPrevBtn" type="button">◀ Prev</button>
        <button id="vNextBtn" type="button">Next ▶</button>
        <span id="viewerTitle" class="title"></span>
        <span class="spacer"></span>
        <button id="zoomOutBtn" type="button">−</button>
        <button id="zoomInBtn" type="button">+</button>
        <button id="fitBtn" type="button">Fit</button>
        <button id="resetBtn" type="button">Reset</button>
        <span id="viewerCount" class="pillDark"></span>
        <button id="openTabBtn" type="button">Open ↗</button>
      </div>

      <div class="stage" id="stage">
        <div id="viewport">
          <img id="fullImg" alt="Selected image" />
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
