<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tableau Image Gallery</title>

    <!-- Tableau Extensions API -->
    <script src="https://unpkg.com/tableau-api@1.7.0/dist/tableau.extensions.1.latest.min.js"></script>

    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #fff;
      }

      .root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid #e5e5e5;
        background: #fff;
      }

      .bar button {
        padding: 6px 10px;
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fff;
      }

      .bar select {
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fff;
      }

      .bar input {
        flex: 1;
        min-width: 180px;
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fafafa;
      }

      .small {
        color: #666;
        font-size: 12px;
        white-space: nowrap;
      }

      .content {
        flex: 1;
        min-height: 0;
        position: relative;
      }

      /* Grid */
      #grid {
        height: 100%;
        overflow: auto;
        padding: 10px;
        background: #f7f7f7;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .card {
        background: #fff;
        border: 1px solid #e6e6e6;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        display: flex;
        flex-direction: column;
        cursor: pointer;
      }

      .thumb {
        height: 130px;
        background: #eee;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .meta {
        padding: 8px 10px;
        font-size: 12px;
        color: #333;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .meta .muted {
        color: #777;
      }

      /* Empty / Error overlay */
      #empty {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 20px;
        text-align: center;
        color: #666;
        background: #fff;
      }
    </style>
  </head>

  <body>
    <div class="root">
      <div class="bar">
        <button id="refreshBtn" type="button">Refresh</button>

        <!-- sheetSelect is injected by main.js before URL field -->
        <span class="small">URL field:</span>
        <select id="fieldSelect">
          <option value="">Auto-detect</option>
        </select>

        <span class="small">Max:</span>
        <select id="limitSelect">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
          <option value="500">500</option>
        </select>

        <input id="status" readonly value="Initializing..." />
      </div>

      <div class="content">
        <div id="grid"></div>
        <div id="empty">
          <div>
            <div style="font-size:14px; margin-bottom:6px;">No images found.</div>
            <div style="font-size:12px; color:#777;">
              Ensure your .trex grants <b>Full Data</b> permission and choose a worksheet + URL field.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
