<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tableau Photo Gallery</title>

  <script src="./tableau.extensions.1.latest.min.js"></script>

  <style>
    :root {
      --bg:      #1b1e24;
      --panel:   #252931;
      --card:    #2d323c;
      --border:  #3a404d;
      --text:    #dde1e9;
      --muted:   #8891a2;
      --accent:  #1e78c2;
      --accent-h:#1a6aad;
      --danger:  #d94040;
      --shadow:  0 1px 3px rgba(0,0,0,0.4);
      --radius:  8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
    }

    /* ── Top bar ────────────────────────────────── */
    .topbar {
      display: flex;
      gap: 10px;
      align-items: flex-end;   /* buttons bottom-align with selects */
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn:hover { background: #363c4a; border-color: #4a5260; }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn.primary:hover { background: var(--accent-h); }
    .btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .btn.danger:hover { background: rgba(217,64,64,0.12); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 4px;
    }

    select, input {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      min-width: 170px;
      outline: none;
      line-height: 1.4;
    }
    select option { background: var(--card); color: var(--text); }
    select:focus, input:focus { border-color: var(--accent); }
    input { min-width: 200px; }
    input::placeholder { color: var(--muted); }
    input[type="search"]::-webkit-search-cancel-button { filter: invert(1) opacity(0.5); }

    .control { display: flex; flex-direction: column; }

    /* ── Second row: Search + paginator on one line ── */
    .topbarRow2 {
      flex-basis: 100%;          /* forces onto its own line inside the topbar flex */
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: nowrap;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
    }
    .topbarRow2 .searchControl {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbarRow2 .searchControl input {
      width: 100%;
      min-width: 0;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pageControls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Image grid ─────────────────────────────── */
    .gridWrap {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 10px;
      position: relative;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      position: relative;
    }
    .card:hover { border-color: var(--accent); }

    .thumb {
      aspect-ratio: 4 / 3;
      width: 100%;
      position: relative;
      background: #1e2229;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      border-radius: 999px;
      padding: 3px 7px;
    }

    .caption {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      background: rgba(27,30,36,0.88);
      border: 1px solid rgba(58,64,77,0.8);
      border-radius: 6px;
      padding: 4px 8px;
    }
    .caption .text {
      font-size: 11px;
      color: #a8b2c1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .iconbtn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      border-radius: 5px;
      padding: 2px 7px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    .iconbtn:hover { color: var(--text); border-color: #4a5260; }

    /* ── Empty state ────────────────────────────── */
    .empty {
      position: absolute;
      inset: 10px;
      display: none;
      place-items: center;
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel);
    }

    /* ── Viewer overlay ─────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .overlay.open { display: flex; }

    .viewer {
      width: min(1100px, 98vw);
      height: min(780px, 92vh);
      background: #0d1117;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #30363d;
    }

    .viewerTop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      color: #c9d1d9;
      font-size: 12px;
    }
    .viewerTop .left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .viewerTitle {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 52vw;
    }
    .viewerBody {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .viewerBody img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #0d1117;
    }
    .viewerTop .actions { display: flex; gap: 8px; align-items: center; }
    .viewerTop .actions .btn {
      padding: 5px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #c9d1d9;
    }
    .viewerTop .actions .btn:hover { background: rgba(255,255,255,0.14); }
  </style>
</head>

<body>
  <div class="app">

    <!-- Top bar: buttons + selectors all bottom-aligned -->
    <div class="topbar">
      <button id="refreshBtn" class="btn primary" type="button">Refresh</button>
      <button id="clearBtn" class="btn danger" type="button">Clear Cache</button>

      <div class="control">
        <label for="sheetSelect">Sheet</label>
        <select id="sheetSelect"></select>
      </div>

      <div class="control">
        <label for="fieldSelect">URL field</label>
        <select id="fieldSelect">
          <option value="">Auto-detect</option>
        </select>
      </div>

      <!-- Second row: Search fills empty space, pills + buttons on the right -->
      <div class="topbarRow2" id="paginator">
        <div class="searchControl">
          <input id="searchInput" type="search" placeholder="Search text" />
        </div>
        <div class="pills">
          <span class="pill" id="countPill">0 images</span>
          <span class="pill" id="pagePill">Page 1 / 1</span>
        </div>
        <div class="pageControls">
          <button id="prevPageBtn" class="btn" type="button">Prev</button>
          <button id="nextPageBtn" class="btn" type="button">Next</button>
          <button id="loadMoreBtn" class="btn" type="button">Load more</button>
        </div>
      </div>
    </div>

    <!-- Image grid -->
    <div class="gridWrap" id="gridWrap">
      <div class="empty" id="empty"></div>
      <div class="grid" id="grid"></div>
    </div>

  </div>

  <!-- Full-screen viewer -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="viewer" role="dialog" aria-modal="true">
      <div class="viewerTop">
        <div class="left">
          <button class="btn" id="closeBtn" type="button">Close (Esc)</button>
          <button class="btn" id="vPrevBtn" type="button">◀ Prev</button>
          <button class="btn" id="vNextBtn" type="button">Next ▶</button>
          <div class="viewerTitle" id="viewerTitle">—</div>
          <div id="viewerCount" style="color:#8b949e;">0 / 0</div>
        </div>
        <div class="actions">
          <button class="btn" id="openTabBtn" type="button">Open ↗</button>
        </div>
      </div>
      <div class="viewerBody">
        <img id="fullImg" alt="Full image" />
      </div>
    </div>
  </div>

  <script src="./main.js?v=4"></script>
</body>
</html>
