<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tableau Image Renderer</title>

    <!-- Tableau Extensions API -->
    <script src="https://unpkg.com/tableau-api@1.7.0/dist/tableau.extensions.1.latest.min.js"></script>

    <style>
      html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; }
      .bar {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 10px; border-bottom: 1px solid #e5e5e5;
      }
      .bar button { padding: 6px 10px; cursor: pointer; }
      .bar input {
        flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px;
        background: #fafafa;
      }
      .imgbox { flex: 1; background: #f7f7f7; display: grid; place-items: center; overflow: hidden; }
      img { max-width: 100%; max-height: 100%; object-fit: contain; }
      .hint { padding: 12px; color: #555; font-size: 13px; text-align: center; }
      .small { color: #777; font-size: 12px; margin-top: 6px; }
      .err { color: #b00020; }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="bar">
        <button id="refreshBtn" type="button">Refresh</button>
        <input id="status" readonly value="Initializing..." />
      </div>

      <div class="imgbox">
        <div id="placeholder" class="hint">
          Select a mark to display an image.
          <div class="small">This extension renders the URL directly in HTML (not Tableau’s native Image object).</div>
        </div>
        <img id="img" alt="Selected image" style="display:none;" />
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
